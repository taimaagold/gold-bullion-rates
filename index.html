<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<script>
function market() {
      let h = new Date().getHours();
      let statusEl = document.getElementById("marketStatus");
      if (h >= 9 && h <= 23) {
          statusEl.innerHTML = "Market Status : OPEN";
          statusEl.style.color = "#00ff7f";
      } else {
          statusEl.innerHTML = "Market Status : CLOSED";
          statusEl.style.color = "#ff4040";
      }
  }
  market();
    let prev={}
    let highs={}
    let lows={}
    setInterval(() => {
  document.getElementById("updateClock").innerHTML =
    "Last update: " + new Date().toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });
}, 1000);
    async function getData(){
    try{
    let goldRes = await fetch("https://api.gold-api.com/price/XAU")
    let goldData = await goldRes.json()
    let silverRes = await fetch("https://api.gold-api.com/price/XAG")
    let silverData = await silverRes.json()
    let fxRes = await fetch("https://api.exchangerate-api.com/v4/latest/USD")
    let fxData = await fxRes.json()
    let gold = goldData.price
    let silver = silverData.price
    let usdinr = fxData.rates.INR
    updateBoard(gold,silver,usdinr)
    }catch(e){
    console.log("API error",e)
    }
    }
    function updateTicker(gold,silver,usdinr,gold1g,gold995,gold9999,goldTT){

function tickerColor(id,val){
let cls=""
if(prev[id]){
if(val>prev[id]) cls="price-up"
else if(val<prev[id]) cls="price-down"
}
prev[id]=val
return cls
}

let tickerText =
"<span>GOLD: <span class='"+tickerColor("tgold",gold)+"'>"+gold.toFixed(2)+"</span></span>" +
"<span>SILVER: <span class='"+tickerColor("tsilver",silver)+"'>"+silver.toFixed(2)+"</span></span>" +
"<span>USDINR: <span class='"+tickerColor("tusd",usdinr)+"'>"+usdinr.toFixed(2)+"</span></span>" +
"<span>GOLD 1GM: <span class='"+tickerColor("t1g",gold1g)+"'>"+gold1g.toFixed(2)+"</span></span>" +
"<span>GOLD 995: <span class='"+tickerColor("t995",gold995)+"'>"+gold995.toFixed(2)+"</span></span>" +
"<span>GOLD 9999: <span class='"+tickerColor("t9999",gold9999)+"'>"+gold9999.toFixed(2)+"</span></span>" +
"<span>TT BAR: <span class='"+tickerColor("ttt",goldTT)+"'>"+goldTT.toFixed(2)+"</span></span>";

document.getElementById("ticker").innerHTML = tickerText + tickerText;
}
    function updateBoard(gold,silver,usdinr){
    let spread = 0.5
    let bid = gold - spread
    let ask = gold + spread
    /* CARD VALUES */
    set("goldBid",bid)
    set("goldAsk",ask)
    set("usdAsk",usdinr)
    updateHigh("goldBidHigh",bid)
    updateHigh("goldAskHigh",ask)
    updateHigh("usdHigh",usdinr)
    /* TABLE CALCULATION */
    let goldGram = (gold * usdinr) / 31.1035
    let gold1g = goldGram/25
    let gold995 = gold1g * 995
    let gold9999 = gold1g * 999
    let goldTT = gold1g * 116.5

    updateTicker(gold,silver,usdinr,gold1g,gold995,gold9999,goldTT);

    function tickerColor(id,val){
let cls=""
if(prev[id]){
if(val>prev[id]) cls="price-up"
else if(val<prev[id]) cls="price-down"
}
prev[id]=val
return cls
}
let tickerText=
"<span class='"+tickerColor("tgold",gold)+"'>GOLD: "+gold.toFixed(2)+"</span>"+
"<span class='"+tickerColor("tsilver",silver)+"'>SILVER: "+silver.toFixed(2)+"</span>"+
"<span class='"+tickerColor("tusd",usdinr)+"'>USDINR: "+usdinr.toFixed(2)+"</span>"+
"<span class='"+tickerColor("t1g",gold1g)+"'>GOLD 1GM: "+gold1g.toFixed(0)+"</span>"+
"<span class='"+tickerColor("t995",gold995)+"'>GOLD 995: "+gold995.toFixed(0)+"</span>"+
"<span class='"+tickerColor("t9999",gold9999)+"'>GOLD 9999: "+gold9999.toFixed(0)+"</span>"+
"<span class='"+tickerColor("ttt",goldTT)+"'>TT BAR: "+goldTT.toFixed(0)+"</span>";
document.getElementById("ticker").innerHTML = tickerText + tickerText;
    updateTable("silverOz",silver)
    updateTable("gold1g",gold1g)
    updateTable("gold995",gold995)
    updateTable("gold9999",gold9999)
    updateTable("goldTT",goldTT)
    }
    function set(id,val){
    let el=document.getElementById(id)
    if(!el) return
    if(prev[id]){
    if(val>prev[id]) el.style.color="green"
    if(val<prev[id]) el.style.color="red"
    }
    prev[id]=val
    el.innerHTML=val.toFixed(2)
    }
    /* CARD HIGH ONLY */
    function updateHigh(id,val){
    let el=document.getElementById(id)
    if(!el) return
    if(!highs[id] || val>highs[id]) highs[id]=val
    el.innerHTML="High: "+highs[id].toFixed(2)
    }
    /* TABLE HIGH + LOW */
    function updateTable(id,val){
set(id,val)
/* HIGH */
if(!highs[id] || val>highs[id]) highs[id]=val
/* LOW */
if(!lows[id] || val<lows[id]) lows[id]=val
let hl=document.getElementById(id+"HL")
if(hl){
hl.innerHTML="H: "+highs[id].toFixed(2)+" | L: "+lows[id].toFixed(2)
}
}
    getData()
    document.getElementById("marketStatus").innerHTML="🟢 MARKET LIVE";
document.getElementById("marketStatus").className="market-open";
    setInterval(simulateMove,700);
    function simulateMove(){
let ids = ["goldBid","goldAsk","usdAsk","silverOz","gold1g","gold995","gold9999","goldTT"];
ids.forEach(id=>{
if(prev[id]){
let move = (Math.random()-0.5) * (prev[id] * 0.0002);
let newPrice = prev[id] + move;
/* PRICE COLOR */
let el = document.getElementById(id);
if(newPrice > prev[id]){
el.style.color = "#00ff7f";
}
else{
el.style.color = "#ff4040";
}
/* UPDATE VALUE */
prev[id] = newPrice;
el.innerHTML = newPrice.toFixed(2);
/* UPDATE HIGH LOW */
if(!highs[id] || newPrice > highs[id]) highs[id] = newPrice;
if(!lows[id] || newPrice < lows[id]) lows[id] = newPrice;
let hl = document.getElementById(id+"HL");
if(hl){
hl.innerHTML = "H: "+highs[id].toFixed(2)+" | L: "+lows[id].toFixed(2);
}
}
});
updateTicker(
prev.goldBid,
prev.silverOz,
prev.usdAsk,
prev.gold1g,
prev.gold995,
prev.gold9999,
prev.goldTT
);

}
setInterval(load,1000);
    </script>
